name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            os_name: linux
            arch: x86_64
            package_ext: tar.gz
          - os: macos-13
            os_name: macos
            arch: x86_64
            package_ext: tar.gz
          - os: macos-14
            os_name: macos
            arch: arm64
            package_ext: tar.gz
          - os: windows-latest
            os_name: windows
            arch: x86_64
            package_ext: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCLOT_ENABLE_LLVM=OFF

      - name: Build
        run: cmake --build build --config Release

      - name: Install
        run: cmake --install build --prefix dist/install --config Release

      - name: Package (tar.gz)
        if: matrix.package_ext == 'tar.gz'
        run: |
          set -euo pipefail
          PKG_DIR="dist/package/clot-${{ matrix.os_name }}-${{ matrix.arch }}"
          mkdir -p "$PKG_DIR"
          cp dist/install/bin/clot "$PKG_DIR/"
          cp LICENSE.txt "$PKG_DIR/"
          tar -czf "dist/clot-${{ matrix.os_name }}-${{ matrix.arch }}.tar.gz" -C dist/package "clot-${{ matrix.os_name }}-${{ matrix.arch }}"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "dist/clot-${{ matrix.os_name }}-${{ matrix.arch }}.tar.gz" > "dist/clot-${{ matrix.os_name }}-${{ matrix.arch }}.sha256"
          else
            shasum -a 256 "dist/clot-${{ matrix.os_name }}-${{ matrix.arch }}.tar.gz" > "dist/clot-${{ matrix.os_name }}-${{ matrix.arch }}.sha256"
          fi

      - name: Package (zip)
        if: matrix.package_ext == 'zip'
        shell: pwsh
        run: |
          $pkgDir = "dist/package/clot-${{ matrix.os_name }}-${{ matrix.arch }}"
          New-Item -ItemType Directory -Force -Path $pkgDir | Out-Null
          Copy-Item "dist/install/bin/clot.exe" "$pkgDir/clot.exe" -Force
          Copy-Item "LICENSE.txt" "$pkgDir/LICENSE.txt" -Force
          $zipPath = "dist/clot-${{ matrix.os_name }}-${{ matrix.arch }}.zip"
          Compress-Archive -Path "$pkgDir/*" -DestinationPath $zipPath -Force
          $hash = Get-FileHash $zipPath -Algorithm SHA256
          "$($hash.Hash)  clot-${{ matrix.os_name }}-${{ matrix.arch }}.zip" | Out-File -Encoding ASCII "dist/clot-${{ matrix.os_name }}-${{ matrix.arch }}.sha256"

      - name: Upload Release Assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/clot-${{ matrix.os_name }}-${{ matrix.arch }}.${{ matrix.package_ext }}
            dist/clot-${{ matrix.os_name }}-${{ matrix.arch }}.sha256
